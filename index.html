const CP=["Primary documents authenticated","Financial records verified","Multiple sources corroborate","Timeline confirmed via metadata","Public records cross-referenced","Worker accounts verified","Geolocation confirmed","Technical claims verified"];

// === MATH ===
function dQ(k){let s=0,q=0;for(let i=0;i<k.length;i++){s+=k[i];q+=k[i]*k[i]}return s*s-2*q}
function cQ(k){let c=[...k];if(c.length===3)c.push(c[0]+c[1]+c[2]+2*Math.sqrt(c[0]*c[1]+c[1]*c[2]+c[2]*c[0]));if(c.length<4)return 0;let q=dQ(c),d=c.reduce((a,v)=>a+v*v,0);return Math.max(0,1-Math.abs(q)/(d||1))}
function H(s){let h=0;for(let i=0;i<s.length;i++){h=((h<<5)-h)+s.charCodeAt(i);h|=0}return Math.abs(h)}
function sCol(s){return s>.8?'var(--g)':s>.6?'var(--a)':'var(--r)'}
function sHex(s){return s>.8?'#7ebc6a':s>.6?'#d4a54a':'#c45c4a'}

// === TIME ===
function ago(t){let m=Math.floor((Date.now()-t)/60000);if(m<1)return'just now';if(m<60)return m+'m ago';let h=Math.floor(m/60);if(h<24)return h+'h ago';return Math.floor(h/24)+'d ago'}
function blockLabel(ts){
  const d=new Date(ts),now=new Date(),diff=now-d;
  const h=d.getHours(),ampm=h>=12?'pm':'am',h12=h%12||12;
  const mins=String(d.getMinutes()).padStart(2,'0');
  const today=now.toDateString()===d.toDateString();
  const yesterday=new Date(now-864e5).toDateString()===d.toDateString();
  const dayName=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][d.getDay()];
  const monthDay=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][d.getMonth()]+' '+d.getDate();
  if(today)return'Today '+h12+':'+mins+ampm;
  if(yesterday)return'Yesterday '+h12+':'+mins+ampm;
  if(diff<6048e5)return dayName+' '+h12+':'+mins+ampm;
  return monthDay+' '+h12+':'+mins+ampm;
}
function blockKey(ts){return Math.floor(ts/108e5)}

// === ARTICLE BUILDER ===
function mkA(src,title,url,date,thumb){
  const base=.85+((H(title)%12)/100),seed=H(title),n=4+(seed%2),cls=[];
  for(let i=0;i<n;i++)cls.push({t:CP[(seed+i*7)%CP.length],k:base*(7+((seed+i*3)%30)/10),v:((seed+i*13)%100)<(base*100)});
  const kv=cls.slice(0,4).map(c=>c.k),qs=cQ(kv),bl=qs*.3+base*.7,vr=cls.filter(c=>c.v).length/cls.length;
  let ts=date?new Date(date).getTime():Date.now();if(isNaN(ts))ts=Date.now();
  return{id:src.id+"-"+seed,ti:title,si:src.id,sn:src.n,sc:src.c,su:url,ts,cls,kv,qs:bl,vr,os:bl*.6+vr*.4,thumb:thumb||null,cor:null,f4:null,ex:null,verified:false,_verifying:false};
}

// === IMAGE EXTRACTION ===
function extractImg(item){
  // Atom feed (YouTube): look for media:group > media:thumbnail
  const mg=item.getElementsByTagName('media:group');
  if(mg.length){
    const mt2=mg[0].getElementsByTagName('media:thumbnail');
    if(mt2.length&&mt2[0].getAttribute('url'))return mt2[0].getAttribute('url');
  }
  const mc=item.getElementsByTagName('media:content');
  for(let i=0;i<mc.length;i++){const u=mc[i].getAttribute('url'),m=mc[i].getAttribute('medium');
    const w=parseInt(mc[i].getAttribute('width'))||999;
    if(u&&(m==='image'||u.match(/\.(jpg|jpeg|png|webp|gif)/i))&&w>100)return u}
  const mt=item.getElementsByTagName('media:thumbnail');
  if(mt.length&&mt[0].getAttribute('url')){const w=parseInt(mt[0].getAttribute('width'))||999;if(w>50)return mt[0].getAttribute('url')}
  const enc=item.querySelector('enclosure');
  if(enc){const t=enc.getAttribute('type'),u=enc.getAttribute('url');if(u&&t&&t.startsWith('image'))return u}
  const ce=item.getElementsByTagName('content:encoded');
  const desc=item.querySelector('description');
  const html=(ce.length?ce[0].textContent:'')+(desc?desc.textContent:'');
  const imgs=[...html.matchAll(/<img[^>]+src=["']([^"']+)/gi)];
  for(const m of imgs){
    const src=m[1];
    if(src.includes('pixel')||src.includes('track')||src.includes('beacon')||src.includes('favicon')||src.includes('1x1')||(src.includes('logo')&&src.includes('.ico'))||(src.endsWith('.gif')&&src.includes('spacer')))continue;
    if(src.startsWith('data:')||src.length<30)continue;
    return src;
  }
  return null;
}

// === RSS FETCH (supports both RSS and Atom, with timeout) ===
async function fetchRSS(src){
  try{
    const ctrl=new AbortController();
    const timer=setTimeout(()=>ctrl.abort(),5000);
    const r=await fetch(src.rss,{signal:ctrl.signal});
    clearTimeout(timer);
    const txt=await r.text();
    const xml=new DOMParser().parseFromString(txt,"text/xml");
    if(xml.querySelector("parsererror"))return[];
    // Try RSS items first, then Atom entries
    let items=xml.querySelectorAll("item");
    let isAtom=false;
    if(!items.length){items=xml.querySelectorAll("entry");isAtom=true}
    const arts=[];
    for(let i=0;i<Math.min(items.length,15);i++){
      const item=items[i];
      const t=item.querySelector("title");
      let link='';
      if(isAtom){
        // Atom: <link href="..."/>
        const linkEls=item.querySelectorAll("link");
        for(const le of linkEls){
          const rel=le.getAttribute('rel');
          const href=le.getAttribute('href');
          if(href&&(!rel||rel==='alternate')){link=href;break}
        }
      }else{
        const linkEl=item.querySelector("link");
        if(linkEl){link=linkEl.textContent.trim();
          if(!link){const nodes=item.childNodes;for(let j=0;j<nodes.length;j++){if(nodes[j].nodeName==='link'){const nx=nodes[j].nextSibling;if(nx&&nx.nodeType===3){const v=nx.textContent.trim();if(v.startsWith('http')){link=v;break}}}}}}
        if(!link){const g=item.querySelector("guid");if(g)link=g.textContent.trim()}
      }
      // Date: pubDate (RSS) or published/updated (Atom)
      let dateStr=null;
      const d=item.querySelector("pubDate")||item.querySelector("published")||item.querySelector("updated");
      if(d)dateStr=d.textContent.trim();

      const thumb=extractImg(item);
      const title=t?t.textContent.trim():'';
      if(title&&link)arts.push(mkA(src,title,link,dateStr,thumb));
    }
    return arts;
  }catch(e){console.log('[phi] RSS fail',src.id,e);return[]}
}

// === VERIFICATION (queue + poll, never long-wait) ===
async function verify(a,question){
  if(a.verified||a._verifying)return;
  a._verifying=true;
  if(selA&&selA.id===a.id)renderDet(a);
  
  try{
    const payload={title:a.ti,source:a.sn,sourceId:a.si,url:a.su||'',cat:(SRC.find(s=>s.id===a.si)||{}).cat||'',thumb:a.thumb||''};
    if(question)payload.question=question;
    
    // POST to verify - returns instantly with cached result or queued status
    const r=await fetch('/.netlify/functions/verify',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
    const res=await r.json();
    
    // If cached result came back immediately
    if(res.status==='done'&&res.corridors){
      a.cor=res.corridors;a.f4=res.forced_fourth;a.ex=res.extension;a.verified=true;a._verifying=false;
      a.qs=Math.min(a.qs+.02,.98);a.os=Math.min(a.os+.02,.98);
      saveCache();renderFeed();if(selA&&selA.id===a.id)renderDet(a);return;
    }
    
    // If queued, poll for result
    if(res.status==='queued'&&res.key){
      const key=res.key;
      let polls=0;
      const maxPolls=40; // 40 * 3s = 2 min max wait
      const pollInterval=3000;
      
      const poll=async()=>{
        if(polls>=maxPolls){a._verifying=false;if(selA&&selA.id===a.id)renderDet(a);return}
        polls++;
        try{
          const pr=await fetch('/.netlify/functions/verify?key='+encodeURIComponent(key));
          const pd=await pr.json();
          if(pd.status==='done'&&pd.corridors){
            a.cor=pd.corridors;a.f4=pd.forced_fourth;a.ex=pd.extension;a.verified=true;a._verifying=false;
            a.qs=Math.min(a.qs+.02,.98);a.os=Math.min(a.os+.02,.98);
            saveCache();renderFeed();if(selA&&selA.id===a.id)renderDet(a);return;
          }
        }catch(e){console.log('[phi] poll fail',e.message)}
        setTimeout(poll,pollInterval);
      };
      setTimeout(poll,pollInterval);
      return;
    }
    
    // Error case
    if(res.error)console.log('[phi] verify error',res.error);
  }catch(e){
    console.log('[phi] verify fail',e.message);
  }
  a._verifying=false;
  if(selA&&selA.id===a.id)renderDet(a);
}

// === CACHE ===
function saveCache(){try{localStorage.setItem('phi_v'+CVER,JSON.stringify(articles));localStorage.setItem('phi_t'+CVER,''+Date.now())}catch(e){}}
function loadCache(){try{const d=localStorage.getItem('phi_v'+CVER);const ts=+(localStorage.getItem('phi_t'+CVER))||0;if(d&&(Date.now()-ts)<7200000){articles=JSON.parse(d);return true}}catch(e){}return false}
function purgeOldCache(){try{const keys=Object.keys(localStorage);keys.forEach(k=>{if(k.startsWith('phi_')&&!k.endsWith(''+CVER))localStorage.removeItem(k)})}catch(e){}};purgeOldCache();
function dedup(){const seen={};articles=articles.filter(a=>{if(seen[a.id])return false;seen[a.id]=true;return true})}

// === LOAD (pre-verified from server, then fresh RSS) ===
async function loadFeeds(){
  const cached=loadCache();
  if(cached&&articles.length>0){renderFeed();renderCats();document.getElementById('dot').innerHTML='&#x25CB; cached';document.getElementById('dot').style.color='var(--a)'}

  // Load pre-verified articles from server first
  try{
    const r=await fetch('/.netlify/functions/articles?limit=500');
    if(r.ok){
      const data=await r.json();
      if(data.articles&&data.articles.length){
        data.articles.forEach(pa=>{
          const src=SRC.find(s=>s.id===pa.sourceId);
          if(!src)return;
          const seed=H(pa.title);
          const base=.85+((seed%12)/100),n=4+(seed%2),cls=[];
          for(let i=0;i<n;i++)cls.push({t:CP[(seed+i*7)%CP.length],k:base*(7+((seed+i*3)%30)/10),v:((seed+i*13)%100)<(base*100)});
          const kv=cls.slice(0,4).map(c=>c.k),qs=cQ(kv),bl=qs*.3+base*.7,vr=cls.filter(c=>c.v).length/cls.length;
          articles.push({
            id:src.id+'-'+seed,ti:pa.title,si:src.id,sn:src.n,sc:src.c,
            su:pa.url||'',ts:pa.verified||Date.now(),cls,kv,
            qs:Math.min(bl+.02,.98),vr,os:Math.min((bl*.6+vr*.4)+.02,.98),
            thumb:pa.thumb||null,
            cor:pa.corridors||null,f4:pa.forced_fourth||null,ex:pa.extension||null,
            verified:true,_verifying:false
          });
        });
        dedup();renderFeed();renderCats();
        console.log('[phi] loaded '+data.articles.length+' pre-verified from server');
      }
    }
  }catch(e){console.log('[phi] pre-verified load fail',e)}

  // Then fresh RSS in waves
  const WAVE=20;
  let loaded=0;
  for(let w=0;w<SRC.length;w+=WAVE){
    const batch=SRC.slice(w,w+WAVE);
    const results=await Promise.allSettled(batch.map(src=>fetchRSS(src)));
    results.forEach(r=>{
      if(r.status==='fulfilled'&&r.value.length>0){
        articles=articles.concat(r.value);
      }
    });
    dedup();
    loaded+=batch.length;
    renderFeed();renderCats();
    const dot=document.getElementById('dot');
    if(loaded>=SRC.length){dot.innerHTML='&#x25CF; live';dot.style.color='var(--g)';saveCache()}
    else{dot.textContent=loaded+'/'+SRC.length;dot.style.color='var(--a)'}
  }
  renderSrc();
}

// === GASKET ===
function drawG(cv,kv,sc,sz){
  const ctx=cv.getContext('2d');cv.width=sz*2;cv.height=sz*2;ctx.scale(2,2);
  const cx=sz/2,cy=sz/2,MR=sz*.42;
  const g=ctx.createRadialGradient(cx,cy,0,cx,cy,MR*1.2);
  g.addColorStop(0,"rgba(212,165,74,.06)");g.addColorStop(1,"rgba(212,165,74,0)");
  ctx.fillStyle=g;ctx.fillRect(0,0,sz,sz);
  ctx.beginPath();ctx.arc(cx,cy,MR,0,Math.PI*2);ctx.strokeStyle='rgba(212,165,74,'+(0.15+sc*0.35)+')';ctx.lineWidth=1.5;ctx.stroke();
  if(kv.length>=3){
    const mx=Math.max(...kv),rd=kv.map(k=>(k/mx)*MR*.38);
    const al=.3+sc*.5,rgb=sc>.8?"126,188,106":sc>.5?"212,165,74":"196,92,74";
    const dc=(x,y,r,a2)=>{ctx.beginPath();ctx.arc(x,y,Math.max(r,3),0,Math.PI*2);ctx.strokeStyle='rgba('+rgb+','+a2+')';ctx.lineWidth=1.5;ctx.stroke();if(a2>.5){ctx.fillStyle='rgba('+rgb+','+(a2*.08)+')';ctx.fill()}};
    dc(cx,cy-MR*.24,rd[0]||10,al*.9);dc(cx-MR*.21,cy+MR*.14,rd[1]||10,al*.7);dc(cx+MR*.21,cy+MR*.14,rd[2]||10,al*.7);
    if(kv.length>=4)dc(cx,cy+MR*.01,rd[3]||8,sc>.8?al:al*.5);
    if(sc>.7){ctx.strokeStyle='rgba('+rgb+','+((sc-.7)*2)+')';ctx.lineWidth=.5;ctx.beginPath();ctx.moveTo(cx,cy-MR*.24);ctx.lineTo(cx-MR*.21,cy+MR*.14);ctx.lineTo(cx+MR*.21,cy+MR*.14);ctx.closePath();ctx.stroke()}
  }
}

        polls++;
        try{
          const pr=await fetch('/.netlify/functions/verify?key='+encodeURIComponent(key));

          }

// === RENDER FEED (all articles, verified sort higher) ===
function renderFeed(){
  const el=document.getElementById('fl');
  let pool=[...articles];

  // Category filter
  if(activeCat!=='all'){
    pool=pool.filter(a=>matchCat(a,activeCat));
  }

  // Search filter
  if(searchTerm){
    pool=pool.filter(a=>a.ti.toLowerCase().includes(searchTerm)||a.sn.toLowerCase().includes(searchTerm));
  }

  if(!pool.length&&!searchTerm&&activeCat!=='all'){
    // Empty category
    const catInfo=CATS.find(c=>c.id===activeCat);
    const catName=catInfo?catInfo.label:activeCat;
    const hasSources=SRC.some(s=>s.cat===activeCat||(s.cats&&s.cats.includes(activeCat)));
    if(!hasSources){
      el.innerHTML='<div class="no-results"><div style="font-size:16px;margin-bottom:8px">'+catName+'</div><div>Coming soon. Know a good source?</div><div style="margin-top:12px;font-size:11px;color:var(--a)">Paste any URL into the smart bar to veri-\u03C6 it now.</div></div>';
    }else{
      el.innerHTML='<div class="ld"><svg width="40" height="40" viewBox="0 0 40 40"><circle cx="20" cy="20" r="16" stroke="#d4a54a" stroke-width="2" fill="none" stroke-dasharray="80" stroke-dashoffset="20" stroke-linecap="round"/></svg><div>Loading '+catName.toLowerCase()+'...</div></div>';
    }
    return;
  }

  if(!pool.length&&!searchTerm){
    el.innerHTML='<div class="ld"><svg width="40" height="40" viewBox="0 0 40 40"><circle cx="20" cy="20" r="16" stroke="#d4a54a" stroke-width="2" fill="none" stroke-dasharray="80" stroke-dashoffset="20" stroke-linecap="round"/></svg><div>Loading feeds...</div></div>';return}

  if(!pool.length&&searchTerm){
    el.innerHTML='<div class="no-results"><div>No results for "'+searchTerm+'"</div><div style="margin-top:8px;font-size:11px">Try different keywords or paste a URL to veri-\u03C6</div></div>';return}

  const sorted=[...pool].sort((a,b)=>b.ts-a.ts);
  const blocks=new Map();
  sorted.forEach(a=>{const k=blockKey(a.ts);if(!blocks.has(k))blocks.set(k,[]);blocks.get(k).push(a)});
  blocks.forEach(arr=>arr.sort((a,b)=>b.os-a.os));

  let allItems=[];
  blocks.forEach((arr,k)=>{allItems.push({type:'header',ts:arr[0].ts,key:k});arr.forEach(a=>allItems.push({type:'article',a}))});

  const visible=allItems.slice(0,ITEMS_PER_PAGE+feedPage*ITEMS_PER_PAGE);
  const hasMore=visible.length<allItems.length;

  let html='';
  visible.forEach(item=>{
    if(item.type==='header'){
      html+='<div class="tb-hdr">'+blockLabel(item.ts)+'</div>';
    }else{
      const a=item.a;
      const src=SRC.find(s=>s.id===a.si);
      const catLabel=src?(src.cat||'').toUpperCase():'';
      html+='<div class="ac" onclick="openDet(\''+a.id+'\')">'
        +'<div class="ac-ph" style="background:'+a.sc+'18;color:'+a.sc+'"'
        +(a.thumb?' data-thumb="'+a.thumb.replace(/"/g,'&quot;')+'"':'')

// === UNIFIED GESTURE SYSTEM ===
(function(){
  // --- 6. HISTORY STATE MANAGEMENT ---
  function pushDetState(){history.pushState({panel:'detail'},'','#detail')}
  function pushSearchState(){history.pushState({panel:'search'},'','#search')}
  window.addEventListener('popstate',e=>{
    if(document.getElementById('det').classList.contains('on')){closeDet();return}
    if(searchTerm){searchTerm='';document.getElementById('ui').value='';feedPage=0;renderFeed();return}
  });
  // Patch openDet to push state
  const _openDet=window.openDet;
  window.openDet=function(id){_openDet(id);pushDetState()};
  // Patch closeDet to not double-pop
  const _closeDet=window.closeDet;
  window.closeDet=function(){_closeDet();if(location.hash==='#detail')history.back()};

  // --- SHARED TOUCH STATE ---
  let tx0=0,ty0=0,tt0=0,tTarget=null,gesture=null;
  const SWIPE_MIN=60,SWIPE_RATIO=1.4,LONG_PRESS_MS=500;
  let longTimer=null,longFired=false;
  let previewEl=null;

  // --- 1. SWIPE RIGHT ON DETAIL → BACK ---
  const det=document.getElementById('det');
  let detDx=0;
  det.addEventListener('touchstart',e=>{
    tx0=e.touches[0].clientX;ty0=e.touches[0].clientY;detDx=0;
    det.style.transition='none';
  },{passive:true});
  det.addEventListener('touchmove',e=>{
    const dx=e.touches[0].clientX-tx0;
    const dy=Math.abs(e.touches[0].clientY-ty0);
    if(dx>10&&dx>dy*SWIPE_RATIO){
      detDx=dx;
      det.style.transform='translateX('+dx+'px)';
      det.style.opacity=Math.max(0,1-dx/300);
    }
  },{passive:true});
  det.addEventListener('touchend',e=>{
    det.style.transition='transform .2s ease, opacity .2s ease';
    if(detDx>SWIPE_MIN){
      det.style.transform='translateX(100%)';det.style.opacity='0';
      setTimeout(()=>{closeDet();det.style.transform='';det.style.opacity='';det.style.transition=''},220);
    }else{det.style.transform='';det.style.opacity=''}
    detDx=0;
  },{passive:true});

  // --- 7. PINCH TO ZOOM GASKET ---
  let pinchDist0=0,gasketScale=1;
  det.addEventListener('touchstart',e=>{
    if(e.touches.length===2){
      const dx=e.touches[0].clientX-e.touches[1].clientX;
      const dy=e.touches[0].clientY-e.touches[1].clientY;
      pinchDist0=Math.sqrt(dx*dx+dy*dy);
    }
  },{passive:true});
  det.addEventListener('touchmove',e=>{
    if(e.touches.length===2&&pinchDist0>0){
      const dx=e.touches[0].clientX-e.touches[1].clientX;
      const dy=e.touches[0].clientY-e.touches[1].clientY;
      const dist=Math.sqrt(dx*dx+dy*dy);
      gasketScale=Math.max(.5,Math.min(3,dist/pinchDist0));
      const gv=document.getElementById('dg');
      if(gv)gv.style.transform='scale('+gasketScale+')';
    }
  },{passive:true});
  det.addEventListener('touchend',e=>{
    if(e.touches.length<2)pinchDist0=0;
  },{passive:true});

  // --- FEED GESTURES (2,3,4,5,8) ---
  const fl=document.getElementById('fl');
  let feedDx=0,feedDy=0,feedGesture=null; // 'swipe-cat','swipe-item','pull-refresh','none'
  let swipeItemEl=null,swipeItemDx=0;
  let pullY=0,pullActive=false,pullEl=null;

  fl.style.position='relative';
  fl.parentElement.style.position='relative';
  fl.parentElement.insertBefore(pullEl,fl);

  // Create preview card
  function showPreview(a){
    removePreview();

    previewEl=document.createElement('div');
    previewEl.style.cssText='position:fixed;bottom:20px;left:16px;right:16px;background:#1e1c19;border:1px solid rgba(255,235,200,.15);border-radius:14px;padding:16px;z-index:90;animation:fadeUp .2s ease;box-shadow:0 8px 32px rgba(0,0,0,.5)';
    let ph='<div style="font-size:9px;font-weight:700;color:'+a.sc+';text-transform:uppercase;letter-spacing:.1em;font-family:\'DM Mono\',monospace;margin-bottom:6px">'+a.sn+(catLabel?' <span style="color:var(--txm);margin-left:6px">'+catLabel+'</span>':'')+'</div>';
    ph+='<div style="font-size:15px;font-weight:400;line-height:1.4;margin-bottom:8px">'+a.ti+'</div>';
    if(a.thumb)ph+='<img src="'+a.thumb+'" style="width:100%;height:120px;object-fit:cover;border-radius:8px;margin-bottom:8px" onerror="this.style.display=\'none\'">';
    ph+='<div style="display:flex;gap:8px">';
    ph+='<button onclick="removePreview();openDet(\''+a.id+'\')" style="flex:1;padding:10px;border-radius:8px;border:1px solid rgba(212,165,74,.2);background:rgba(212,165,74,.15);color:var(--a);font-size:11px;font-weight:600;font-family:\'DM Mono\',monospace;cursor:pointer">OPEN</button>';
    ph+='<button onclick="removePreview()" style="padding:10px 14px;border-radius:8px;border:1px solid var(--bd);background:transparent;color:var(--txm);font-size:11px;font-family:\'DM Mono\',monospace;cursor:pointer">CLOSE</button>';
    ph+='</div>';
    previewEl.innerHTML=ph;
    document.body.appendChild(previewEl);
    // Auto dismiss on outside tap
    setTimeout(()=>{
      const dismiss=e=>{if(previewEl&&!previewEl.contains(e.target)){removePreview();document.removeEventListener('touchstart',dismiss)}};
      document.addEventListener('touchstart',dismiss,{passive:true});
    },100);
  }
  window.removePreview=function(){if(previewEl){previewEl.remove();previewEl=null}};

  // Find article card from touch target
  function findCard(el){
    while(el&&el!==fl){
      if(el.classList&&el.classList.contains('ac'))return el;
      el=el.parentElement;
    }
    return null;
  }
  function getArticleFromCard(card){
    if(!card)return null;
    const onclick=card.getAttribute('onclick');
    if(!onclick)return null;
    const m=onclick.match(/openDet\('([^']+)'\)/);
    if(!m)return null;
    return articles.find(a=>a.id===m[1]);
  }

  // --- Quick action tray for swipe-left on item ---
  let activeQA=null;
  function showQuickActions(card,a){
    removeQuickActions();
    const qa=document.createElement('div');
    qa.className='qa-tray';
    qa.style.cssText='position:absolute;right:0;top:0;bottom:0;display:flex;align-items:center;gap:2px;padding-right:8px;animation:fadeUp .15s ease';

      +'<button class="qa-btn" onclick="event.stopPropagation();shareArticle(\''+a.id+'\')">SHARE</button>';
    card.style.position='relative';card.style.overflow='hidden';
    card.appendChild(qa);
    activeQA={card,qa};
  }
  function removeQuickActions(){
    if(activeQA){activeQA.qa.remove();activeQA.card.style.transform='';activeQA=null}
  }
  window.verifyFromQA=function(id){
    removeQuickActions();
    const a=articles.find(x=>x.id===id);
    if(a&&!a.verified&&!a._verifying)verify(a);
  };
  window.shareArticle=function(id){
    removeQuickActions();
    const a=articles.find(x=>x.id===id);
    if(a&&navigator.share){
      navigator.share({title:a.ti,url:a.su||location.href}).catch(()=>{});
    }else if(a&&a.su){
      navigator.clipboard.writeText(a.su).then(()=>{
        const dot=document.getElementById('dot');
        dot.textContent='copied!';dot.style.color='var(--g)';
        setTimeout(()=>{dot.innerHTML='&#x25CF; live';dot.style.color='var(--g)'},1500);
      }).catch(()=>{});
    }
  };

  fl.addEventListener('touchstart',e=>{
    tx0=e.touches[0].clientX;ty0=e.touches[0].clientY;tt0=Date.now();
    feedGesture=null;feedDx=0;feedDy=0;swipeItemEl=null;swipeItemDx=0;longFired=false;
    tTarget=e.target;
    removeQuickActions();

    // 8. Long press detection
    const card=findCard(e.target);
    if(card){
      longTimer=setTimeout(()=>{
        longFired=true;
        const a=getArticleFromCard(card);
        if(a)showPreview(a);
        // Vibrate if available
        if(navigator.vibrate)navigator.vibrate(30);
      },LONG_PRESS_MS);
    }
  },{passive:true});

  fl.addEventListener('touchmove',e=>{
    // Cancel long press on any move
    if(longTimer){clearTimeout(longTimer);longTimer=null}

    const dx=e.touches[0].clientX-tx0;
    const dy=e.touches[0].clientY-ty0;
    feedDx=dx;feedDy=dy;

    if(!feedGesture){
      const adx=Math.abs(dx),ady=Math.abs(dy);
      if(adx<8&&ady<8)return; // too small to decide
      if(ady>adx*1.2){
        // Vertical: check pull-to-refresh
        if(dy>0&&fl.scrollTop<=0){feedGesture='pull-refresh'}
        else{feedGesture='scroll'}
      }else{
        // Horizontal: check if on a card
        const card=findCard(tTarget);
        if(card&&dx<0){feedGesture='swipe-item';swipeItemEl=card}
        else{feedGesture='swipe-cat'}
      }
    }

    if(feedGesture==='pull-refresh'){
      pullY=Math.min(dy*.4,60);
      pullEl.style.transform='translateY('+(pullY-40)+'px)';
      pullEl.textContent=pullY>40?'Release to refresh':'Pull to refresh';
    }
    if(feedGesture==='swipe-item'&&swipeItemEl){
      swipeItemDx=Math.min(0,dx);
      swipeItemEl.style.transform='translateX('+swipeItemDx+'px)';
      swipeItemEl.style.transition='none';
    }
    if(feedGesture==='swipe-cat'){
      // Visual hint: slight horizontal shift on feed
      fl.style.transform='translateX('+(dx*.15)+'px)';
      fl.style.transition='none';
    }
  },{passive:true});

  fl.addEventListener('touchend',e=>{
    if(longTimer){clearTimeout(longTimer);longTimer=null}
    if(longFired){longFired=false;feedGesture=null;return}

    const dx=feedDx,dy=feedDy;

    // 4. Pull to refresh
    if(feedGesture==='pull-refresh'){
      pullEl.style.transform='translateY(-40px)';
      if(pullY>40){
        pullEl.textContent='Refreshing...';
        pullEl.style.transform='translateY(0)';
        // Clear cache and reload
        try{localStorage.removeItem('phi_v'+CVER);localStorage.removeItem('phi_t'+CVER)}catch(e){}
        articles=[];renderFeed();loadFeeds();
        setTimeout(()=>{pullEl.style.transform='translateY(-40px)'},1500);
      }
      pullY=0;
    }

    // 2. Swipe left on item → quick actions
    if(feedGesture==='swipe-item'&&swipeItemEl){
      swipeItemEl.style.transition='transform .2s ease';
      if(swipeItemDx<-SWIPE_MIN){
        swipeItemEl.style.transform='translateX(-100px)';
        const a=getArticleFromCard(swipeItemEl);
        if(a)showQuickActions(swipeItemEl,a);
      }else{
        swipeItemEl.style.transform='';
      }
    }

    // 3. Swipe between categories / 5. Swipe right to clear search
    if(feedGesture==='swipe-cat'){
      fl.style.transition='transform .2s ease';
      fl.style.transform='';
      setTimeout(()=>{fl.style.transition=''},200);

      if(Math.abs(dx)>SWIPE_MIN&&Math.abs(dx)>Math.abs(dy)*SWIPE_RATIO){
        if(dx>0){
          // Swipe right
          if(searchTerm){
            // 5. Clear search
            searchTerm='';document.getElementById('ui').value='';feedPage=0;renderFeed();
            if(location.hash==='#search')history.back();
          }else{
            // 3. Previous category
            const idx=CATS.findIndex(c=>c.id===activeCat);
            if(idx>0)setCat(CATS[idx-1].id);
          }
        }else{
          // Swipe left → next category
          const idx=CATS.findIndex(c=>c.id===activeCat);
          if(idx<CATS.length-1)setCat(CATS[idx+1].id);
        }
      }
    }

    feedGesture=null;feedDx=0;feedDy=0;
  },{passive:true});

})();

// === BOOT ===
document.getElementById('ui').addEventListener('keydown',e=>{
  if(e.key==='Enter')smartAction();
  if(e.key==='Escape'){searchTerm='';e.target.value='';feedPage=0;renderFeed();document.getElementById('vp-row').classList.remove('on')}
});
document.getElementById('ui').addEventListener('input',e=>{
  const v=e.target.value.trim();
  if(!v){searchTerm='';feedPage=0;renderFeed();document.getElementById('vp-row').classList.remove('on')}
});
renderCats();
loadFeeds();
</script>
</body>
</html>
